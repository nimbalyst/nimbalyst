<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Inter, -apple-system, sans-serif; background: var(--mockup-bg-secondary, #1a1a1a); color: var(--mockup-text, #fff); display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: var(--mockup-bg, #2d2d2d); border: 1px solid var(--mockup-border, #4a4a4a); border-radius: 16px; padding: 40px; width: 380px; }
    .logo { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
    .logo span { color: var(--mockup-primary, #60a5fa); }
    .subtitle { font-size: 14px; color: var(--mockup-text-muted, #b3b3b3); margin-bottom: 32px; }
    .field { margin-bottom: 20px; }
    .field label { display: block; font-size: 13px; color: var(--mockup-text-muted, #b3b3b3); margin-bottom: 6px; }
    .field input { width: 100%; padding: 10px 14px; background: var(--mockup-bg-secondary, #1a1a1a); border: 1px solid var(--mockup-border, #4a4a4a); border-radius: 8px; color: var(--mockup-text, #fff); font-size: 14px; outline: none; }
    .field input:focus { border-color: var(--mockup-primary, #60a5fa); }
    .btn { width: 100%; padding: 12px; background: var(--mockup-primary, #60a5fa); color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .btn:hover { opacity: 0.9; }
    .error { background: rgba(239,68,68,0.15); color: #ef4444; padding: 10px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
    .footer { text-align: center; margin-top: 24px; font-size: 13px; color: var(--mockup-text-muted, #b3b3b3); }
    .footer a { color: var(--mockup-primary, #60a5fa); text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Acme<span>Hub</span></div>
    <div class="subtitle">Sign in to your workspace</div>
    <div class="error" id="error"></div>
    <div class="field"><label>Email</label><input type="email" id="email" placeholder="you@company.com" /></div>
    <div class="field"><label>Password</label><input type="password" id="password" placeholder="Enter your password" /></div>
    <button class="btn" id="signin">Sign In</button>
    <div class="footer">Don't have an account? <a href="#">Sign up</a></div>
  </div>
  <script>
    const btn = document.getElementById('signin');
    const error = document.getElementById('error');
    const email = document.getElementById('email');
    const pw = document.getElementById('password');

    btn.addEventListener('click', () => {
      if (!email.value || !pw.value) {
        error.textContent = 'Please fill in all fields';
        error.style.display = 'block';
      } else {
        error.style.display = 'none';
        btn.textContent = 'Signing in...';
        btn.style.opacity = '0.6';
        btn.disabled = true;
        setTimeout(() => { btn.textContent = 'Redirecting...'; btn.style.background = '#4ade80'; }, 1500);
      }
    });
    pw.addEventListener('keydown', e => { if (e.key === 'Enter') btn.click(); });
  </script>
</body>
</html>
