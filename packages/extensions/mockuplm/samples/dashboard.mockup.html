<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Inter, -apple-system, sans-serif; background: var(--mockup-bg-secondary, #1a1a1a); color: var(--mockup-text, #fff); display: flex; height: 100vh; overflow: hidden; }
    .sidebar { width: 220px; background: var(--mockup-bg, #2d2d2d); border-right: 1px solid var(--mockup-border, #4a4a4a); display: flex; flex-direction: column; flex-shrink: 0; }
    .sidebar-header { padding: 20px; border-bottom: 1px solid var(--mockup-border, #4a4a4a); font-size: 18px; font-weight: 700; }
    .sidebar-header span { color: var(--mockup-primary, #60a5fa); }
    .sidebar-nav { padding: 12px; flex: 1; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; font-size: 14px; cursor: pointer; color: var(--mockup-text-muted, #b3b3b3); }
    .nav-item:hover { background: var(--mockup-bg-tertiary, #3a3a3a); color: var(--mockup-text, #fff); }
    .nav-item.active { background: rgba(96,165,250,0.15); color: var(--mockup-primary, #60a5fa); }
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .topbar { padding: 16px 24px; border-bottom: 1px solid var(--mockup-border, #4a4a4a); }
    .topbar h1 { font-size: 20px; font-weight: 600; }
    .content { flex: 1; padding: 24px; overflow-y: auto; }
    .page { display: none; }
    .page.active { display: block; }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
    .stat { background: var(--mockup-bg, #2d2d2d); border: 1px solid var(--mockup-border, #4a4a4a); border-radius: 12px; padding: 20px; }
    .stat .label { font-size: 13px; color: var(--mockup-text-muted, #b3b3b3); margin-bottom: 8px; }
    .stat .value { font-size: 28px; font-weight: 700; }
    .stat .change { font-size: 12px; color: var(--mockup-success, #4ade80); margin-top: 4px; }
    .projects { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .project { background: var(--mockup-bg, #2d2d2d); border: 1px solid var(--mockup-border, #4a4a4a); border-radius: 12px; padding: 20px; cursor: pointer; transition: border-color 0.15s; }
    .project:hover { border-color: var(--mockup-primary, #60a5fa); }
    .project .name { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .project .desc { font-size: 13px; color: var(--mockup-text-muted, #b3b3b3); }
    .setting-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 1px solid var(--mockup-border, #4a4a4a); }
    .setting-row:last-child { border-bottom: none; }
    .toggle { width: 40px; height: 22px; border-radius: 11px; cursor: pointer; position: relative; }
    .toggle.on { background: var(--mockup-primary, #60a5fa); }
    .toggle.off { background: var(--mockup-bg-tertiary, #3a3a3a); }
    .toggle::after { content: ''; position: absolute; width: 18px; height: 18px; border-radius: 50%; background: #fff; top: 2px; transition: left 0.2s; }
    .toggle.on::after { left: 20px; }
    .toggle.off::after { left: 2px; }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="sidebar-header">Acme<span>Hub</span></div>
    <div class="sidebar-nav">
      <div class="nav-item active" data-page="overview">Overview</div>
      <div class="nav-item" data-page="projects">Projects</div>
      <div class="nav-item" data-page="settings">Settings</div>
    </div>
  </div>
  <div class="main">
    <div class="topbar"><h1 id="title">Overview</h1></div>
    <div class="content">
      <div class="page active" id="page-overview">
        <div class="stats">
          <div class="stat"><div class="label">Active Projects</div><div class="value">12</div><div class="change">+2 this month</div></div>
          <div class="stat"><div class="label">Team Members</div><div class="value">24</div><div class="change">+3 this quarter</div></div>
          <div class="stat"><div class="label">Tasks Completed</div><div class="value">847</div><div class="change">+127 this week</div></div>
        </div>
      </div>
      <div class="page" id="page-projects">
        <div class="projects" id="projects"></div>
      </div>
      <div class="page" id="page-settings">
        <div class="setting-row"><span>Dark Mode</span><div class="toggle on"></div></div>
        <div class="setting-row"><span>Notifications</span><div class="toggle on"></div></div>
        <div class="setting-row"><span>Auto-save</span><div class="toggle off"></div></div>
      </div>
    </div>
  </div>
  <script>
    // Nav
    const navItems = document.querySelectorAll('.nav-item');
    const titles = { overview: 'Overview', projects: 'Projects', settings: 'Settings' };
    navItems.forEach(item => {
      item.addEventListener('click', () => {
        const page = item.dataset.page;
        navItems.forEach(n => n.classList.remove('active'));
        item.classList.add('active');
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + page).classList.add('active');
        document.getElementById('title').textContent = titles[page];
      });
    });

    // Projects
    const projects = [
      { name: 'Website Redesign', desc: 'Modernizing the marketing site' },
      { name: 'Mobile App v2', desc: 'Native iOS and Android rebuild' },
      { name: 'API Migration', desc: 'Moving to GraphQL' },
      { name: 'Design System', desc: 'Component library and tokens' },
    ];
    const grid = document.getElementById('projects');
    projects.forEach(p => {
      grid.innerHTML += `<div class="project"><div class="name">${p.name}</div><div class="desc">${p.desc}</div></div>`;
    });

    // Toggles
    document.querySelectorAll('.toggle').forEach(t => {
      t.addEventListener('click', () => { t.classList.toggle('on'); t.classList.toggle('off'); });
    });
  </script>
</body>
</html>
