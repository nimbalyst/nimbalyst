# Android Build
#
# Builds the Android app's release APK and Play-ready Android App Bundle on Linux CI.
#
# Signing is OPTIONAL. The release keystore is decoded from a base64 GitHub
# secret only when that secret is present; with no secret the build still runs
# and produces an UNSIGNED release APK (build.gradle.kts sets
# hasReleaseKeystore = false when the keystore file is absent). This keeps
# forks and secret-less PRs green.
#
# Google Play publishing is intentionally OUT OF SCOPE here. This workflow only
# builds, unit-tests, asserts the bundled transcript, and uploads release
# artifacts.

name: Android Build

on:
  push:
    branches: [main]
    paths:
      - 'packages/android/**'
      - 'packages/runtime/**'
      - '.github/workflows/android-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/android/**'
      - 'packages/runtime/**'
      - '.github/workflows/android-build.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Make npm resilient to transient registry socket drops (ECONNRESET) on the
  # cache-miss path. On a cache hit npm ci is skipped entirely (see below), so
  # these only matter when the lockfile changed and packages must be fetched.
  npm_config_fetch_retries: '5'
  npm_config_fetch_retry_mintimeout: '20000'
  npm_config_fetch_retry_maxtimeout: '120000'
  npm_config_fetch_timeout: '300000'

jobs:
  android-build:
    name: Android Build
    runs-on: ubuntu-latest

    # Surface the optional signing + Firebase secrets as job-level env vars.
    # GitHub does not allow `secrets` in a step `if:`, but a job-level `env` IS
    # available in step-level `if:`, so the decode steps below guard on these.
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_BASE64 }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      # node_modules cache short-circuits `npm ci` when the lockfile is
      # unchanged, so the common case makes ZERO registry calls and can't hit a
      # transient network failure. Exact-key match only (no restore-keys) so we
      # never run against a partially-stale tree -- on miss we just `npm ci`.
      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v6
        with:
          path: |
            node_modules
            packages/*/node_modules
            packages/extensions/*/node_modules
          key: node-modules-android-${{ runner.os }}-node24-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --ignore-scripts

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install Android platform and build-tools
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      # Optional: decode Firebase config only when the secret is present. Without
      # this file the app still builds, but Firebase/FCM stays inert.
      - name: Decode Firebase Android config
        if: ${{ env.ANDROID_GOOGLE_SERVICES_JSON_BASE64 != '' }}
        run: |
          echo "$ANDROID_GOOGLE_SERVICES_JSON_BASE64" | base64 -d > packages/android/app/google-services.json
          echo "Decoded Firebase Android config"

      - name: Build transcript bundle
        run: npm run android:build:transcript

      - name: Verify transcript bundle exists
        run: |
          if [ ! -f "packages/android/dist-transcript/transcript.html" ]; then
            echo "Error: transcript.html not found in packages/android/dist-transcript/"
            exit 1
          fi
          if [ ! -d "packages/android/dist-transcript/assets" ]; then
            echo "Error: assets folder not found in packages/android/dist-transcript/"
            exit 1
          fi
          echo "Transcript bundle built successfully"
          du -sh packages/android/dist-transcript
          du -sh packages/android/dist-transcript/assets

      # Optional: decode the release keystore only when the secret is present.
      # `env.ANDROID_KEYSTORE_BASE64` resolves from the job-level env above; an
      # absent secret yields an empty string and this step is skipped.
      - name: Decode release keystore
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > packages/android/app/ci-release.keystore
          echo "Decoded release keystore"

      # Optional: decode the production google-services.json only when the secret
      # is present. Without it the google-services plugin stays unapplied
      # (build.gradle.kts applies it only if the file exists), so push is inert
      # and forks / secret-less PRs still build green. A CI-uploaded AAB will only
      # have working push when this secret is set.
      - name: Decode google-services.json
        if: ${{ env.ANDROID_GOOGLE_SERVICES_JSON_BASE64 != '' }}
        run: |
          echo "$ANDROID_GOOGLE_SERVICES_JSON_BASE64" | base64 -d > packages/android/app/google-services.json
          echo "Decoded google-services.json"

      # Fail loudly if a signing keystore was supplied (i.e. this is a real
      # release build) but the Firebase config was not: shipping a signed AAB
      # with push silently disabled is a launch-blocking regression.
      - name: Require google-services.json for signed release builds
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' && env.ANDROID_GOOGLE_SERVICES_JSON_BASE64 == '' }}
        run: |
          echo "Error: signed release build requested but ANDROID_GOOGLE_SERVICES_JSON_BASE64 is not set."
          echo "The resulting AAB would ship without working push notifications."
          exit 1

      # The transcript bundle (built above) MUST exist before release builds:
      # preBuild -> syncTranscriptAssets throws if packages/android/dist-transcript
      # is missing. This single step always runs (signed when the keystore was
      # decoded, unsigned otherwise), so secret-less builds stay green.
      - name: Run unit tests and build release artifacts
        working-directory: packages/android
        env:
          NIMBALYST_ANDROID_KEYSTORE: ${{ github.workspace }}/packages/android/app/ci-release.keystore
          NIMBALYST_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          NIMBALYST_ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          NIMBALYST_ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :app:testDebugUnitTest :app:assembleRelease :app:bundleRelease

      # When a keystore secret was supplied, prove the release APK is actually
      # signed. Without this a future signing regression (renamed secret, wrong
      # env var) would silently ship an unsigned APK while the job stays green.
      - name: Verify release APK is signed
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          APK_PATH=$(find packages/android/app/build/outputs/apk/release -name "*.apk" -type f | head -n 1)
          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name apksigner | sort | tail -n 1)
          if [ -z "$APKSIGNER" ]; then
            echo "Error: apksigner not found in build-tools"
            exit 1
          fi
          "$APKSIGNER" verify --verbose "$APK_PATH"
          echo "Release APK signature verified"

      # App Bundles are the Play Store upload artifact. They are signed with the
      # same release signingConfig when the optional keystore secret is present.
      - name: Verify release AAB is signed
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          AAB_PATH=$(find packages/android/app/build/outputs/bundle/release -name "*.aab" -type f | head -n 1)
          if [ -z "$AAB_PATH" ]; then
            echo "Error: Could not find built release AAB"
            exit 1
          fi
          jarsigner -verify -certs "$AAB_PATH"
          echo "Release AAB signature verified"

      - name: Verify transcript bundle in APK
        run: |
          APK_PATH=$(find packages/android/app/build/outputs/apk/release -name "*.apk" -type f | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "Error: Could not find built release APK"
            exit 1
          fi
          echo "Inspecting APK: $APK_PATH"
          if ! unzip -l "$APK_PATH" | grep -q "assets/transcript-dist/transcript.html"; then
            echo "Error: assets/transcript-dist/transcript.html not found inside APK"
            unzip -l "$APK_PATH"
            exit 1
          fi
          echo "Transcript bundle successfully included in APK"

      - name: Verify transcript bundle in AAB
        run: |
          AAB_PATH=$(find packages/android/app/build/outputs/bundle/release -name "*.aab" -type f | head -n 1)
          if [ -z "$AAB_PATH" ]; then
            echo "Error: Could not find built release AAB"
            exit 1
          fi
          echo "Inspecting AAB: $AAB_PATH"
          if ! unzip -l "$AAB_PATH" | grep -q "base/assets/transcript-dist/transcript.html"; then
            echo "Error: base/assets/transcript-dist/transcript.html not found inside AAB"
            unzip -l "$AAB_PATH"
            exit 1
          fi
          echo "Transcript bundle successfully included in AAB"

      - name: Upload release APK
        uses: actions/upload-artifact@v7
        with:
          name: android-release-apk
          path: packages/android/app/build/outputs/apk/release/*.apk

      - name: Upload release AAB
        uses: actions/upload-artifact@v7
        with:
          name: android-release-aab
          path: packages/android/app/build/outputs/bundle/release/*.aab
